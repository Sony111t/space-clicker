name: Build APK

on:
  workflow_dispatch:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android Build-Tools
      run: |
        sdkmanager "build-tools;34.0.0" "platforms;android-34" "platform-tools"

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libsqlite3-dev libgdbm-dev libssl-dev libffi-dev cmake
        pip install --upgrade pip
        pip install Cython==0.29.33 buildozer kivy pillow

    - name: Unzip game files
      run: |
        unzip -o game.zip -d .

    - name: Create Buildozer Spec
      run: |
        cat <<EOT > buildozer.spec
        [app]
        title = Space Clicker
        package.name = spaceclicker
        package.domain = org.logic
        source.dir = .
        source.include_exts = py,png,jpg,jpeg,ttf,ogg,mp3,json
        version = 1.0
        orientation = portrait
        requirements = python3,kivy,pillow
        fullscreen = 1
        android.archs = arm64-v8a, armeabi-v7a
        android.allow_backup = True
        android.accept_sdk_license = True
        EOT

    - name: Build with Buildozer
      run: |
        YES=1 buildozer -v android debug
        
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SpaceClicker-APK
        path: bin/*.apk
